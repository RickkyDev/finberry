<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finberry</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header class="cabecalho">
        <div class="esquerda-cabecalho">
            <img class="logo-cabecalho" src="assets/finberry-logo.png" alt="Finberry Logo">
            <h1 class="titulo-cabecalho">Finberry</h1>
        </div>
        <img class="profile-pic" src="assets/profilepic.png" alt="Foto de perfil padrão">
    </header>
    <div class="dashboard">
        <div class="inout-cards">
            <div class="card entradas">
                <h2 class="titulo-card text-entradas">Entradas</h2>
                <p class="valor-card valor-entradas">R$ 12.000,00</p>
            </div>
            <div class="card saidas">
                <h2 class="titulo-card text-saidas">Saídas</h2>
                <p class="valor-card valor-saidas">R$ 8.000,00</p>
            </div>
        </div>
        <div class="card saldo">
            <h2 class="titulo-card text-saldo">Saldo do mês</h2>
            <p class="valor-card valor-saldo">R$ 4.000,00</p>
        </div>
    </div>
</body>

</html>
